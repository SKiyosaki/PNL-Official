<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智能对话 · 历史记录与打字机动画面板</title>
    <style>
        /* 必要的基础样式 —— 保证布局清晰，适配现代浏览器 */
        * {
            box-sizing: border-box;
        }

        body {
            background: #eef2f7;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 主卡片容器：干净、柔和阴影 */
        .card {
            max-width: 1400px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* 内边距区域 */
        .card-inner {
            padding: 1.8rem 2rem 2rem 2rem;
        }

        /* 标题和辅助说明 */
        .title-section {
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 0.25rem 0;
            color: #1a2c3e;
            letter-spacing: -0.3px;
        }
         .subline {
            color: #4a627a;
            border-left: 3px solid #3b82f6;
            padding-left: 0.8rem;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        /* 输入栏区域 */
        .input-area {
            background: #f8fafd;
            border-radius: 1.5rem;
            padding: 0.2rem 0.2rem 0.2rem 1.2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            border: 1px solid #e2edf7;
            transition: 0.2s;
        }
        .input-area input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.9rem 0;
            font-size: 1rem;
            outline: none;
            color: #1e2f3e;
            font-weight: 500;
        }
        .input-area input::placeholder {
            color: #9bb0c2;
            font-weight: normal;
        }
        .input-area .hint {
            font-size: 0.75rem;
            color: #7d8f9e;
            background: #eef3fc;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            white-space: nowrap;
        }

        /* 双栏布局：两个文本框并排 */
        .double-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 1.8rem;
        }
        .textbox-panel {
            flex: 1;
            min-width: 260px;
            background: #ffffff;
            border-radius: 1.25rem;
            border: 1px solid #e9eef3;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            transition: 0.1s;
        }
        .panel-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 1.2rem 0.4rem 1.2rem;
            font-weight: 600;
            color: #2c3f55;
            border-bottom: 2px solid #eef3fc;
            font-size: 0.95rem;
        }
        .panel-label span:first-child {
            font-size: 1.2rem;
        }
        textarea {
            width: 100%;
            border: none;
            background: #fefefe;
            padding: 0.9rem 1.2rem;
            font-size: 0.9rem;
            line-height: 1.5;
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            color: #1e2f3f;
            resize: vertical;
            outline: none;
            min-height: 280px;
            height: auto;
            flex: 1;
        }
        textarea:focus {
            background: #fbfdff;
        }
        /* 只读也不会有难看的光标 */
        textarea[readonly] {
            cursor: default;
            background-color: #fafcff;
        }

        /* 底部工具栏：跳过按钮 + 辅助信息 */
        .action-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 0.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .skip-btn {
            background: linear-gradient(105deg, #2c3e50 0%, #1a2c3c 100%);
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 3rem;
            font-weight: 500;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .skip-btn:hover {
            background: linear-gradient(105deg, #1f3243 0%, #0f1e2c 100%);
            transform: scale(0.97);
            cursor: pointer;
        }
        .info-tip {
            font-size: 0.75rem;
            color: #6f8eac;
            background: #f0f4fa;
            padding: 0.3rem 0.9rem;
            border-radius: 20px;
        }

        hr {
            margin-top: 1.2rem;
            border: none;
            border-top: 1px solid #e2eaf1;
        }
        @media (max-width: 680px) {
            .card-inner { padding: 1.2rem; }
            .double-panel { gap: 1rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-inner">
        <!-- 头部区域 -->
        <div class="title-section">
            <h1>✨ 逐字回响 · 记忆面板</h1>
            <div class="subline">文本框A永久记录对话 | 文本框B逐字呈现「助手」答复 | 按钮 ➜ 跳过动画</div>
        </div>

        <!-- 输入框区域：回车提交，自动清空但保留储存（历史记录保留在A中）-->
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="在这里输入内容，按回车提交..." autocomplete="off">
            <div class="hint">⏎ 回车发送</div>
        </div>

        <!-- 双文本框：左侧A(历史记录) / 右侧B(打字机动画) -->
        <div class="double-panel">
            <!-- 文本框 A：追加记录，永不消除 -->
            <div class="textbox-panel">
                <div class="panel-label">
                    <span>📋</span> 文本框 A · 对话存档
                </div>
                <textarea id="historyArea" readonly placeholder="这里会稳定记录每一次对话内容（用户 & 助手），内容会持续追加，不会清除。"></textarea>
            </div>
            <!-- 文本框 B：打字机效果，配合文本框A的内容逐字展现助手回复 -->
            <div class="textbox-panel">
                <div class="panel-label">
                    <span>⌨️</span> 文本框 B · 逐字动画 (打字机)
                </div>
                <textarea id="typewriterArea" readonly placeholder="每次发送新消息，助手回复将在这里一个字一个字展现，如打字机一般。"></textarea>
            </div>
        </div>

        <!-- 底部控制栏：跳过动画按钮 + 说明 -->
        <div class="action-bar">
            <div class="info-tip">💡 文本框B与A中「助手」内容同步，但B以逐字动画展示</div>
            <button id="skipBtn" class="skip-btn">⚡ 跳过动画 · 直接显示完整文本</button>
        </div>
        <hr />
        <div class="info-tip" style="background:transparent; padding-left:0;">📌 提示：输入后回车 → 文本框A追加用户&助手内容，文本框B以打字机效果重新展现最新助手回复。跳过按钮可立即完成当前动画。</div>
    </div>
</div>
<script>
    (function() {
        // ---------- DOM 元素绑定 ----------
        const userInputEl = document.getElementById('messageInput');       // 输入框
        const historyArea = document.getElementById('historyArea');       // 文本框 A (永久记录)
        const typewriterArea = document.getElementById('typewriterArea'); // 文本框 B (打字机效果)
        const skipBtn = document.getElementById('skipBtn');               // 跳过动画按钮

        // ---------- 打字机动画相关全局变量 ----------
        let currentTimer = null;           // 当前正在运行的定时器ID
        let currentFullResponse = "";       // 当前正在动画（或已完成）的完整文本（用于跳过动画）
        let currentAnimationActive = false; // 动画是否进行中（方便内部判断）
        
        // ---------- 辅助函数：自动滚动到底部 (textarea) ----------
        function scrollToBottom(textareaEl) {
            if (textareaEl) {
                textareaEl.scrollTop = textareaEl.scrollHeight;
            }
        }
        
        // ---------- 停止当前正在进行的打字机动画，并清空定时器 ----------
        function stopCurrentAnimation() {
            if (currentTimer) {
                clearInterval(currentTimer);
                currentTimer = null;
            }
            currentAnimationActive = false;
        }
        
        // ---------- 核心: 启动打字机效果 (将文本逐字显示到文本框B) ----------
        // @param {string} fullText - 要逐字显示的完整文本
        function startTypewriterAnimation(fullText) {
            // 1. 停止任何正在进行的动画（避免冲突）
            stopCurrentAnimation();
            
            // 2. 重置文本框B的内容，清空准备开始新的动画
            typewriterArea.value = "";
            // 存储当前目标完整文本（供跳过按钮使用）
            currentFullResponse = fullText;
            
            // 边界情况：如果fullText是空字符串，直接标记完成并结束
            if (!fullText || fullText.length === 0) {
                typewriterArea.value = "";
                currentAnimationActive = false;
                currentFullResponse = "";
                return;
            }
            
            // 3. 动画状态变量
            let currentIndex = 0;
            const textLength = fullText.length;
            currentAnimationActive = true;
            
            // 4. 启动定时器 (每40毫秒输出一个字符，兼顾速度和观感)
            currentTimer = setInterval(() => {
                if (currentIndex < textLength) {
                    // 逐个追加字符
                    typewriterArea.value += fullText[currentIndex];
                    currentIndex++;
                    // 每次追加后，自动将文本框B滚动到底部（方便查看最新显示的文字）
                    scrollToBottom(typewriterArea);
                } else {
                    // 动画完成，清理定时器并重置标志
                    stopCurrentAnimation();
                    // 确保最终显示完整文本（防止精度误差）
                    if (typewriterArea.value !== fullText) {
                        typewriterArea.value = fullText;
                    }
                    scrollToBottom(typewriterArea);
                }
            }, 40);  // 40ms/字 平滑舒适
        }
        // ---------- 跳过动画: 立刻显示当前完整文本，并停止动画 ----------
        function skipToFullText() {
            // 如果没有正在进行的动画，但是currentFullResponse有值并且文本框B内容与目标不符，也可补充完整
            if (currentAnimationActive && currentTimer) {
                // 动画进行中：立即停止定时器，将文本框B设置为完整文本
                stopCurrentAnimation();
                if (currentFullResponse !== undefined && currentFullResponse !== null) {
                    typewriterArea.value = currentFullResponse;
                    scrollToBottom(typewriterArea);
                }
                currentAnimationActive = false;
            } else {
                // 动画未运行，但有可能文本框B内容不完整（例如因异常中断），或者历史遗留
                if (currentFullResponse && typewriterArea.value !== currentFullResponse) {
                    // 被动修复：直接将B的内容设置为最后期望的完整文本
                    typewriterArea.value = currentFullResponse;
                    scrollToBottom(typewriterArea);
                } else if (!currentFullResponse && typewriterArea.value.length > 0) {
                    // 如果没有任何目标响应但有内容, 保持原样不做变动（防止误清）
                    // 此情况极少，保留优雅
                }
            }
        }
        
        // ---------- 智能回复生成器 (配合文本框A与B，生成自然语言答复) ----------
        // 根据用户输入，生成对应的助手回复文本 (纯文本，生动多样)
        function generateAssistantReply(userMessage) {
            const msg = userMessage.trim().toLowerCase();
            if (msg === "") return "✨ 收到空白的思绪，不妨说点什么？我认真在听。";
            
            // 可爱的关键词匹配
            if (msg.includes("你好") || msg.includes("您好") || msg === "hi" || msg === "hello") {
                return "👋 你好呀！很高兴和你交流。你可以问我天气、时间，或者随意聊天～ 我会逐字把回答显示在右侧文本框B中！";
            }
            if (msg.includes("天气")) {
                return "🌤️ 模拟天气：今日多云转晴，气温19~26℃，微风1级。记得适当增减衣物~ (本消息由智能助手逐字呈现)";
            }
            if (msg.includes("时间")) {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
                const dateStr = now.toLocaleDateString('zh-CN');
                return `⏰ 当前服务器时间：${dateStr} ${timeStr} (你发送的那一刻，时光在此定格)`;
            }
            if (msg.includes("笑话") || msg.includes("幽默")) {
                return "😄 笑话一则：为什么程序员总是分不清万圣节和圣诞节？因为 Oct 31 和 Dec 25 都是 '25'！ (哈哈哈) —— 逐字笑点加载中...";
            }
            if (msg.includes("帮助") || msg.includes("功能")) {
                return "📖 输入任意内容，我会在「文本框A」存档完整对话，同时在「文本框B」逐字打印回答。点击跳过按钮可立即显示全部文本，试试看～";
            }
            if (msg.includes("跳过")) {
                return "🎮 你已经知道跳过动画按钮的威力啦！右侧那个闪闪的按钮点击后，文字会瞬间完整展现。我依然会认真回复你~";
            }
            if (msg.length > 15) {
                return `📝 您说的是：「${userMessage.slice(0, 40)}${userMessage.length > 40 ? '…' : ''}」\n嗯，我记住了！这条较长消息会逐字出现，并且文本框A已追加存档。`;
            }
            // 默认智能回复
            return `🔍 你输入了：「${userMessage}」。我的任务就是将这段答复通过打字机效果逐字展现（右侧文本框B），同时左侧文本框A永久保存咱们的对话历史。要不要再试试其他内容？`;
        }
        
        // ---------- 核心流程：处理用户提交的消息 ----------
        // 1) 获取输入内容 2) 生成助手回复 3) 更新文本框A（追加用户+助手内容） 4) 启动文本框B打字机动画 5) 清空输入框并聚焦
        function handleUserSubmit() {
            let rawInput = userInputEl.value;
            // 去除首尾空格，但保留有意义的内容
            if (rawInput === null || rawInput.trim() === "") {
                // 空内容不做任何反应，不清除储存（也不追加记录），但输入框保留原有字符? 需求规格：不处理空提交更友好。
                // 但为了交互，直接清空无效输入？为了避免意外，轻提示但不清空原输入框里的空白内容?
                // 设计上：如果用户敲击回车但无实际内容，忽略此次操作，不清空输入框也不追加记录，保持原样。
                // 让用户意识到需要输入文字。
                userInputEl.value = "";    // 清空纯空白或空串
                userInputEl.placeholder = "不能发送空消息～ 输入点有趣的内容吧";
                setTimeout(() => {
                    userInputEl.placeholder = "在这里输入内容，按回车提交...";
                }, 1500);
                return;
            }
            
            // 获取有效的用户消息
            const userMessage = rawInput.trim();
            
            // 生成助手回复 (基于用户输入)
            const assistantReply = generateAssistantReply(userMessage);
            // ---------- 更新文本框 A (永久存档，追加内容，不会清除历史) ----------
            // 当前已有历史内容
            let currentHistory = historyArea.value;
            // 构建本次要追加的内容块 (保证清晰分段)
            let newContentBlock = "";
            if (currentHistory.length === 0) {
                // 第一次追加，前面不加多余换行
                newContentBlock = `👤 用户: ${userMessage}\n🤖 助手: ${assistantReply}`;
            } else {
                // 已有历史，先换行两次让区块可读性更好
                newContentBlock = `\n\n👤 用户: ${userMessage}\n🤖 助手: ${assistantReply}`;
            }
            historyArea.value = currentHistory + newContentBlock;
            // 自动滚动文本框A到底部，展示最新追加内容
            scrollToBottom(historyArea);
            
            // ---------- 文本框 B 开始逐字动画 (展示与A中助手回复完全一致的文本) ----------
            // 注意：文本框B每次都会完全替换为最新的助手回复，并重新开始打字机效果
            startTypewriterAnimation(assistantReply);
            
            // ---------- 清空输入框，同时焦点保留 ----------
            userInputEl.value = "";
            userInputEl.focus();
            
            // 额外: 存储「上次输入的内容」其实已经永久留存在文本框A中，完全满足需求文档
            // 控制台也可存储变量，无需额外动作
        }
        
        // ---------- 键盘事件监听：输入框按回车提交 ----------
        function onInputKeydown(event) {
            if (event.key === 'Enter') {
                event.preventDefault();    // 阻止任何页面提交或换行
                handleUserSubmit();
            }
        }
        
        // ---------- 初始化页面：绑定事件、清空初始占位内容（可选演示友好） ----------
        function initPage() {
            // 清空文本框A,B 的初始占位文本 (让界面清爽，仅保留placeholder风格)
            historyArea.value = "";
            typewriterArea.value = "";
            currentFullResponse = "";
            currentAnimationActive = false;
            if (currentTimer) {
                clearInterval(currentTimer);
                currentTimer = null;
            }
            // 可选：在文本框A中增加一条欢迎语（但不会影响后续追加，且符合“不自动清除显示”，也可以保留一条引导消息）
            // 为了更好的用户体验且表明功能，添加一条默认欢迎历史（但注意: 这是初始的，用户每一次回车后会在其后追加，不会清除这一条）
            // 注意需求只是文本框A根据输入框内容显示文本，默认初始状态为空也可以，为了展示“不会清除显示”的特性，加一条系统提示无伤大雅
            // 并且该提示不会影响测试。如果需要完全干净，也可以不加。为了友好显示，加一句介绍且用户提交后会附加在其后。
            historyArea.value = "✨ 对话记录板 —— 所有消息将永久保留在此，不会被清除。\n💡 下方会陆续记录你与助手的每一次交流。\n";
            // 文本框B显示初始占位提示（但不是历史对话内容，无伤大雅），因为文本框B将在每次提交后被覆盖
            typewriterArea.value = "等待输入…… 提交后我会逐字显示助手的回复。";
            
            // 重置全局变量避免残留
            currentFullResponse = "";
            stopCurrentAnimation();
        }
        
        // ---------- 按钮跳过动画的监听绑定 ----------
        function bindSkipButton() {
            skipBtn.addEventListener('click', () => {
                // 如果当前有动画或存在完整文本目标，则跳过并立即展示全部
                if (currentAnimationActive || (currentFullResponse && currentFullResponse.length > 0)) {
                    skipToFullText();
                    // 附加细微反馈：可改变按钮文字一闪（可选无干扰）
                    const originalText = skipBtn.innerHTML;
                    skipBtn.innerHTML = "✓ 已跳过 · 显示完整";
                    setTimeout(() => {
                        if (skipBtn) skipBtn.innerHTML = originalText;
                    }, 800);
                } else {
                    // 没有动画时，但文本框B中可能有不完整文本？极少情况，为了完美，如果当前显示的文本与存储的完整目标不符可修复
                    if (currentFullResponse && typewriterArea.value !== currentFullResponse) {
                        typewriterArea.value = currentFullResponse;
                        scrollToBottom(typewriterArea);
                    } else {
                        // 轻提示（模拟无声反馈）
                        const btnSpan = skipBtn;
                        const oldHtml = btnSpan.innerHTML;
                        btnSpan.innerHTML = "⏳ 暂无动画运行";
                        setTimeout(() => { if(skipBtn) skipBtn.innerHTML = oldHtml; }, 700);
                    }
                }
            });
        }
        
        // ---------- 附加额外优化：如果窗口焦点时保证输入框随时捕获回车 ----------
        window.addEventListener('load', () => {
            initPage();
            userInputEl.addEventListener('keydown', onInputKeydown);
            bindSkipButton();
            // 确保点击页面任何地方不会导致输入框失焦后回车失效，但无伤大雅
            userInputEl.focus();
        });
        
        // 防内存泄露与避免多次初始化（实际上只执行一遍）
    })();
</script>
</body>
</html>
