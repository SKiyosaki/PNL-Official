<!DOCTYPE html>
<html style="height: 100%;">
<head> 
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>特别旅途</title> 
    <link rel="stylesheet" type="text/css" href="CSS/SPAC.css">
</head>
<body>
    <div class="gameback">
        <main>
        </main>
        <aside>
            <!--输出框-->
            <div class="textbox-panel">
                <textarea id="historyArea" readonly placeholder="OutPut"></textarea>
            </div>
            <!--输入框区域-->
            <hr style="border: none; height:2px; background-color: black; margin: 0px 3px; opacity: 26%;">
            <div class="input-area">
                <input type="text" id="commandInput" placeholder="Input" autocomplete="off">
                <div class="hint"></div>
            </div>
        </aside>
    </div>
    <script>
        (function() {
            const userInputEl = document.getElementById('commandInput');
            const historyArea = document.getElementById('historyArea');
            var start="n";
            var gameChapter="1";

            function scrollToBottom(textareaEl) {
                if (textareaEl) {
                    textareaEl.scrollTop = textareaEl.scrollHeight;
                }
            }

            function generateAssistantReply(userMessage) {
                const msg = userMessage.trim().toLowerCase();
                if (msg === "") return "";
                
                // key word output
                if (start == "n"){
                    if (msg == "start") {
                        start = "y";
                        return `Welcome to use ANLOs`;
                    }
                    if (msg == "exit") {
                        window.location.href = "index.html";
                    }
                }
                if (start == "y"){
                    if (msg == "time") {
                        const now = new Date();
                        const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
                        const dateStr = now.toLocaleDateString('zh-CN');
                        return `Time：${dateStr} ${timeStr}`;
                    }
                    if (msg == "help" || msg == "function") {
                        return "help; function; time";
                    }
                    if (msg == "exit") {
                        start = "n";
                        return ``;
                    }
                }
            }   

            function handleUserSubmit(){
                let rawInput = userInputEl.value;
                
                if (rawInput === null || rawInput.trim() === "") {
                    userInputEl.value = "";
                    userInputEl.placeholder = "No Text";
                    setTimeout(() => {
                        userInputEl.placeholder = "Input";
                    }, 1500);
                    return;
                }

                const userMessage = rawInput.trim();
                const assistantReply = generateAssistantReply(userMessage);
                let currentHistory = historyArea.value;
                let newContentBlock = "";
                if (currentHistory.length === 0) {
                    if (start == "n"){
                        newContentBlock = `Input>> ${userMessage}\n>> ${assistantReply}`;
                    }
                    if (start == "y"){
                        newContentBlock = `Input>> ${userMessage}\nANLOs>> ${assistantReply}`;
                    }
                } else {
                    if (start == "n"){
                        newContentBlock = `\nInput>> ${userMessage}\n>> ${assistantReply}`;
                    }
                    if (start == "y"){
                        newContentBlock = `\nInput>> ${userMessage}\nANLOs>> ${assistantReply}`;
                    }
                }
                historyArea.value = currentHistory + newContentBlock;
                scrollToBottom(historyArea);
                
                userInputEl.value = "";
                userInputEl.focus();
            }

            function onInputKeydown(event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    handleUserSubmit();
                }
            }
            function initPage() {
                historyArea.value = "";
            }
            window.addEventListener('load', () => {
            initPage();
            userInputEl.addEventListener('keydown', onInputKeydown);
            });
        })();
    </script>
</body>
</html>
